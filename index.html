<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlavourFinds</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class=" w-full h-auto flex flex-col m-w-[1024px] lg:m-auto">
    <header
      class="min-h-15 h-auto border-b  border-[#534338] w-full flex md:justify-between items-center  fixed flex-col md:flex-row bg-[#3A2F27] z-1000 ">
      <div class="bannerContainer min-h-15 w-full md:w-auto flex justify-between items-center ml-6.5 ">
        <div class="flex items-center gap-1">
          <div class=" bg-[#E2622D] text-[#1B1613] border border-[#3A2F27] rounded 
          py-1 px-2 font-bold text-xl font-oswald">FF</div>
          <h2 class="text-2xl font-oswald uppercase font-bold text-white">FlavourFinds</h2>
        </div>
        <div class="menuIconContainer flex md:hidden absolute right-0">
          <button class="hamburger hamburger--spin text-black " type="button">
            <span class="hamburger-box ">
              <span class="hamburger-inner"></span>
            </span>
          </button>
        </div>
      </div>
      <div class="searchBarContainer hidden md:flex">
        <input type="text" placeholder="🔍 Search Items..."
          class="h-9 border border-[#534338]  rounded-2xl p-3 pl-4 pr-6 text-base outline-none searchBar bg-[#1B1613] text-[#d8b57d]">
      </div>
      <div class="headerButtonContainer mr-6.5 hidden md:flex gap-1.5">
        <button class="addRecipe rounded-lg border-2 p-1.5 px-2 border-[#534338] text-[14px] font-sans text-[#F1E4D0]"><i
            class="fa-regular fa-pen-to-square primary-color text-base mr-0.5"></i>Our Story</button>
        <button class="bookMarks rounded-lg border-2 p-1.5 px-2 border-[#534338] text-[14px] font-sans text-[#F1E4D0]"><i
            class="fa-solid fa-phone primary-color text-base mr-0.5"></i>Contact Us</button>
      </div>


      <!-- Mobile Navbar -->
      <div class="mobileNavbarrContainer w-full hidden max-h-0 opacity-0 flex flex-col border-t-2 border-[#ccc]  gap-2 px-2 transition-all duration-300 ease-in-out bg-white
      relative z-1000">
        <div class="searchBarContainer pt-4">
          <input type="text" placeholder="Search Items..."
            class="h-9 border border-[#ccc] rounded-2xl p-3 pl-4 pr-6 text-base outline-none w-full searchBar">
        </div>
        <div class="headerButtonContainer mr-6.5  gap-1.5 w-full flex justify-center pb-4">
          <button
            class="rounded p-1.5 pl-4 pr-4 border-4 border-none primary-bg text-white font-semibold text-[14px] font-sans"><i
              class="fa-regular fa-pen-to-square  text-base mr-0.5"></i>ADD RECIPE</button>
          <button
            class="rounded p-1.5 px-4 border-4 border-none primary-bg font-semibold text-white text-[14px] font-sans"><i
              class="fa-regular fa-bookmark  text-base mr-0.5"></i>BOOKMARKS</button>
        </div>
      </div>
    </header>
    <main class="flex-1 w-full mt-15 flex flex-row">
      <div class="mainLayout w-full md:w-[75%] shadow-[0px_5px_15px_rgba(0,0,0,0.35)]">
        <div
          class="navigationPanel w-full h-13 flex justify-center items-center gap-3 px-3 border-b border-[#534338] bg-[#1B1613]">
          <span
            class="allNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]  sm:text-base bg-[#E2622D] border  border-[#534338] text-[#1B1613]">All</span>
          <span
            class="BurgersNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]   sm:text-base bg-[#241D18]  border text-[#C99A44] border-[#534338]">Burgers</span>

          <span
            class="SteaksNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]   sm:text-base bg-[#241D18]  border text-[#C99A44] border-[#534338]">Steaks</span>
          <span
            class="pizzaNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]   sm:text-base bg-[#241D18]  border text-[#C99A44] border-[#534338]">Pizza</span>
          <span
            class="drinksNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]   sm:text-base bg-[#241D18]  border text-[#C99A44] border-[#534338]">Drinks</span>
          <span
            class="dessertsNavigation cursor-pointer px-5  sm:px-5 py-1 rounded-sm  font-serif  text-[15px]   sm:text-base bg-[#241D18]  border text-[#C99A44] border-[#534338]">Desserts</span>
        </div>
        <div
          class="cards h-[calc(100vh-112px)] overflow-y-scroll flex flex-wrap gap-5 justify-center items-center py-5 bg-[#1B1613]">
          <div class="loader"></div>
          <p class="font-semibold text-2xl">Fetching Products</p>

        </div>
      </div>
      <div class="mainCart w-[25%]  hidden  h-[calc(100vh-60px)] md:flex  flex-col text-2xl font-semibold overflow-y-scroll">
        <div class="flex items-center justify-between">
          <h5 class=" font-semibold leading-none text-2xl w-full flex justify-start items-center py-2 px-3">View Cart</h5>
        </div>
        <div class="flow-root">
          <ul role="list" class="flex flex-col gap-y-1 cartList">
            <li class="py-1 sm:py-1 w-full flex justify-between items-center px-2">
              <p class=" text-xl font-medium w-full text-center"> Add Items from the menu</p>
            </li>
          </ul>
          <div class="text-center mt-4">
          <button class="placeOrder w-[90%] p-1 rounded bg-[#e92d1f] text-white text-base">
            Place Order
          </button>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
